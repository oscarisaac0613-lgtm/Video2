<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cebollita</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .pantalla {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }

    #inicio {
      background: #000;
      z-index: 5;
      cursor: pointer;
    }

    #inicio h1 {
      font-size: 2rem;
      line-height: 1.4;
      margin: 0;
      max-width: 320px;
    }

    #inicio p {
      margin-top: 14px;
      color: #bbb;
      font-size: 1rem;
    }

    #videoPantalla {
      display: none;
      background: radial-gradient(circle at center, #1a0010, #000);
    }

    .video-wrap {
      position: relative;
      width: min(92vw, 420px);
      aspect-ratio: 9 / 16;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 22px;
      box-shadow: 0 0 30px rgba(255, 60, 120, 0.28);
      border: 2px solid rgba(255,255,255,0.08);
      background: #111;
      position: relative;
      z-index: 2;
    }

    .corazon {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      animation: flotar 4s linear forwards;
      opacity: 0.95;
      z-index: 3;
    }

    .mensaje-abajo {
      margin-top: 18px;
      color: #ffd7e6;
      font-size: 1.1rem;
      text-align: center;
    }

    @keyframes flotar {
      0% {
        transform: translate(0, 0) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.35);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div id="inicio" class="pantalla">
    <h1>toca la pantalla cebollita</h1>
    <p>🖤</p>
  </div>

  <div id="videoPantalla" class="pantalla">
    <div class="video-wrap" id="videoWrap">
      <video id="miVideo" playsinline controls>
        <source src="video.mp4" type="video/mp4">
        Tu navegador no puede reproducir este video.
      </video>
    </div>
    <div class="mensaje-abajo">Para ti 🧅❤️</div>
  </div>

  <script>
    const inicio = document.getElementById("inicio");
    const videoPantalla = document.getElementById("videoPantalla");
    const miVideo = document.getElementById("miVideo");
    const videoWrap = document.getElementById("videoWrap");

    let intervaloCorazones;

    function crearCorazon() {
      const corazon = document.createElement("div");
      corazon.className = "corazon";
      corazon.textContent = "❤️";

      const lado = Math.floor(Math.random() * 4);
      let startX = 0;
      let startY = 0;

      const rect = videoWrap.getBoundingClientRect();

      if (lado === 0) {
        startX = rect.width * Math.random();
        startY = -10;
      } else if (lado === 1) {
        startX = rect.width + 10;
        startY = rect.height * Math.random();
      } else if (lado === 2) {
        startX = rect.width * Math.random();
        startY = rect.height + 10;
      } else {
        startX = -10;
        startY = rect.height * Math.random();
      }

      const moveX = (Math.random() * 160 - 80) + "px";
      const moveY = (-120 - Math.random() * 180) + "px";

      corazon.style.left = startX + "px";
      corazon.style.top = startY + "px";
      corazon.style.setProperty("--x", moveX);
      corazon.style.setProperty("--y", moveY);
      corazon.style.fontSize = (16 + Math.random() * 22) + "px";

      videoWrap.appendChild(corazon);

      setTimeout(() => {
        corazon.remove();
      }, 4000);
    }

    function iniciarTodo() {
      inicio.style.display = "none";
      videoPantalla.style.display = "flex";

      miVideo.play().catch(() => {});

      for (let i = 0; i < 18; i++) {
        setTimeout(crearCorazon, i * 160);
      }

      intervaloCorazones = setInterval(crearCorazon, 320);
    }

    inicio.addEventListener("click", iniciarTodo, { once: true });
    inicio.addEventListener("touchstart", iniciarTodo, { once: true });

    miVideo.addEventListener("ended", () => {
      clearInterval(intervaloCorazones);
    });
  </script>

</body>
</html>
