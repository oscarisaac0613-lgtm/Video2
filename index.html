<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cebollita</title>
  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family:Arial,sans-serif;
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    #inicio, #videoPantalla{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      padding:24px;
    }

    #videoPantalla{
      display:none;
      background:#000;
    }

    h1{
      font-size:2rem;
      line-height:1.4;
      max-width:320px;
      margin:0;
    }

    .video-wrap{
      position:relative;
      width:min(92vw,420px);
      aspect-ratio:9/16;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#111;
      border-radius:20px;
    }

    .corazon{
      position:absolute;
      font-size:24px;
      animation:flotar 4s linear forwards;
      pointer-events:none;
    }

    @keyframes flotar{
      0%{
        transform:translate(0,0) scale(.8);
        opacity:0;
      }
      15%{
        opacity:1;
      }
      100%{
        transform:translate(var(--x),var(--y)) scale(1.3);
        opacity:0;
      }
    }
  </style>
</head>
<body>

  <div id="inicio">
    <h1>toca la pantalla cebollita</h1>
  </div>

  <div id="videoPantalla">
    <div class="video-wrap" id="videoWrap">
      <video id="miVideo" playsinline controls preload="auto">
        <source src="video.MP4" type="video/mp4">
      </video>
    </div>
  </div>

  <script>
    const inicio = document.getElementById("inicio");
    const videoPantalla = document.getElementById("videoPantalla");
    const miVideo = document.getElementById("miVideo");
    const videoWrap = document.getElementById("videoWrap");

    function crearCorazon() {
      const corazon = document.createElement("div");
      corazon.className = "corazon";
      corazon.textContent = "❤️";
      corazon.style.left = Math.random() * videoWrap.clientWidth + "px";
      corazon.style.top = videoWrap.clientHeight + "px";
      corazon.style.setProperty("--x", (Math.random() * 200 - 100) + "px");
      corazon.style.setProperty("--y", (-180 - Math.random() * 160) + "px");
      videoWrap.appendChild(corazon);
      setTimeout(() => corazon.remove(), 4000);
    }

    function iniciarTodo() {
      inicio.style.display = "none";
      videoPantalla.style.display = "flex";
      miVideo.play().catch(() => {});
      for (let i = 0; i < 12; i++) {
        setTimeout(crearCorazon, i * 180);
      }
      setInterval(crearCorazon, 500);
    }

    inicio.addEventListener("click", iniciarTodo, { once:true });
    inicio.addEventListener("touchstart", iniciarTodo, { once:true });
  </script>

</body>
</html>
